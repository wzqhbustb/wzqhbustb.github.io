# Site Configuration
title: "Thinking Notes"
description: "Sharing thoughts on technology and life"
author: "Your Name"
email: "your.email@example.com"

# Site URL (update after deploying to GitHub Pages)
# baseurl: "/your-repo-name"  # Uncomment and modify if deploying to subdirectory
url: "" # Your GitHub Pages URL, e.g., "https://username.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass Settings
sass:
  style: compressed

# Pagination Settings
paginate: 10
paginate_path: "/page/:num/"

# Navigation Menu
nav:
  - title: "Home"
    url: "/"
  - title: "Tech"
    url: "/categories/tech"
  - title: "Life"
    url: "/categories/life"
  - title: "About"
    url: "/about"

# Social Links
social:
  github: your-github-username
  twitter: your-twitter-username
  email: your.email@example.com

# Other Settings
timezone: UTC
encoding: utf-8
