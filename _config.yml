# 站点配置
title: "思考笔记"
description: "分享技术与人生的思考"
author: "你的名字"
email: "your.email@example.com"

# 站点 URL（部署到 GitHub Pages 后修改）
# baseurl: "/your-repo-name"  # 如果部署到子目录，取消注释并修改
url: "" # 你的 GitHub Pages 地址，如 "https://username.github.io"

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass 设置
sass:
  style: compressed

# 分页设置
paginate: 10
paginate_path: "/page/:num/"

# 导航菜单
nav:
  - title: "首页"
    url: "/"
  - title: "技术"
    url: "/categories/tech"
  - title: "思考"
    url: "/categories/life"
  - title: "关于"
    url: "/about"

# 社交链接
social:
  github: your-github-username
  twitter: your-twitter-username
  email: your.email@example.com

# 其他设置
timezone: Asia/Shanghai
encoding: utf-8
